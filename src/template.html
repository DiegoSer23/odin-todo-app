<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-item">
            <button id="AddProjectBtn"></button>
            <h3>Add Project</h3>
        </div>
        <div class="sidebar-item">
            <button id="CurrentProjectsBtn"></button>
            <h3>Today Projects</h3>
        </div>
        <div class="sidebar-item">
            <button id="AllProjectsBtn"></button>
            <h3>All Projects</h3>
        </div>
        <div class="sidebar-item">
            <button class="project-btn">Default Project</button>
        </div>
    </div>
    <div id="content">
        <form id="add-project-form" class="hidden-form">
            <input type="text" name="project-name" placeholder="Project Name" required>
            <input type="text" name="todo-name" placeholder="First To Do" required>
            <input type="text" name="todo-description" placeholder="To Do description" required>
            <input type="date" name="todo-duedate" placeholder="Due Date" required>
            <select name="todo-priority" id="priority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <button type="submit">Add Project</button>
        </form>
        <div class="project-display">
            <label class="project-label">Default Project</label>
            <div class="todo-item">
                <input type="checkbox" name="done-item" value="done">
                <label class="todo-title">Add to do task</label>
                <button class="expand-todo"></button>
                <div class="todo-details">
                    <label class="todo-item-description">Study Fullstack</label>
                    <label class="todo-item-dueDate">20/11/1997</label>
                    <label class="todo-item-priority">Medium</label>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
